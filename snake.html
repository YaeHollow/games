<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
  }
  #score { font-size: 24px; margin-bottom: 10px; }
  canvas {
    border: 2px solid #e94560;
    background: #16213e;
  }
  #message {
    margin-top: 15px;
    font-size: 18px;
    color: #e94560;
    min-height: 28px;
  }
  button {
    margin-top: 10px;
    padding: 10px 30px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: none;
  }
  #controls {
    display: grid;
    grid-template-columns: repeat(3, 60px);
    gap: 5px;
    margin-top: 15px;
  }
  .ctrl-btn {
    width: 60px;
    height: 60px;
    background: #e94560;
    border: none;
    border-radius: 8px;
    font-size: 22px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn.empty { background: transparent; }
</style>
</head>
<body>

<div id="score">Score: 0</div>
<canvas id="canvas" width="300" height="300"></canvas>
<div id="message"></div>
<button id="restartBtn" onclick="startGame()">Play Again</button>

<div id="controls">
  <div class="ctrl-btn empty"></div>
  <button class="ctrl-btn" onclick="setDir(0,-1)">▲</button>
  <div class="ctrl-btn empty"></div>
  <button class="ctrl-btn" onclick="setDir(-1,0)">◀</button>
  <button class="ctrl-btn" onclick="setDir(0,1)">▼</button>
  <button class="ctrl-btn" onclick="setDir(1,0)">▶</button>
</div>

<script src="https://telegram.org/js/games.js"></script>
<script>
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const CELL   = 20;
const COLS   = canvas.width  / CELL;
const ROWS   = canvas.height / CELL;

let snake, dir, nextDir, food, score, gameLoop, running;

function startGame() {
  snake   = [{x: 10, y: 10}];
  dir     = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score   = 0;
  running = true;
  document.getElementById('restartBtn').style.display = 'none';
  document.getElementById('message').textContent = '';
  updateScore();
  placeFood();
  clearInterval(gameLoop);
  gameLoop = setInterval(update, 150);
}

function setDir(x, y) {
  // Prevent reversing
  if (x === -dir.x && y === -dir.y) return;
  nextDir = {x, y};
}

function placeFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function update() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  // Wall collision
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) {
    return endGame();
  }
  // Self collision
  if (snake.some(s => s.x === head.x && s.y === head.y)) {
    return endGame();
  }

  snake.unshift(head);

  if (head.x === food.x && head.y === food.y) {
    score += 10;
    updateScore();
    placeFood();
  } else {
    snake.pop();
  }

  draw();
}

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Food
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2 - 2, 0, Math.PI * 2);
  ctx.fill();

  // Snake
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#4ecca3' : '#45b393';
    ctx.beginPath();
    ctx.roundRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2, 4);
    ctx.fill();
  });
}

function updateScore() {
  document.getElementById('score').textContent = `Score: ${score}`;
}

function endGame() {
  clearInterval(gameLoop);
  running = false;
  document.getElementById('message').textContent = `Game Over! Score: ${score}`;
  document.getElementById('restartBtn').style.display = 'inline-block';

  // Submit score to Telegram
  if (window.TelegramGameProxy) {
    TelegramGameProxy.shareScore();
  }
  // This is what sends the score to our bot
  window.parent.postMessage(JSON.stringify({
    eventType: 'share_score',
    eventData: { score: score }
  }), '*');
}

// Keyboard controls
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp:    [0, -1],
    ArrowDown:  [0,  1],
    ArrowLeft:  [-1, 0],
    ArrowRight: [ 1, 0],
  };
  if (map[e.key]) {
    e.preventDefault();
    setDir(...map[e.key]);
  }
});

startGame();
</script>
</body>
</html>
