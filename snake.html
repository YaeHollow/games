<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Snake</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: Arial, sans-serif;
    color: white;
    user-select: none;
  }
  #score { font-size: 24px; margin-bottom: 10px; }
  canvas {
    border: 2px solid #e94560;
    background: #16213e;
    touch-action: none;
  }
  #message {
    margin-top: 15px;
    font-size: 16px;
    color: #e94560;
    min-height: 24px;
    text-align: center;
    padding: 0 10px;
  }
  #restartBtn {
    margin-top: 10px;
    padding: 10px 30px;
    background: #e94560;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
    display: none;
  }
  #controls {
    display: grid;
    grid-template-columns: repeat(3, 60px);
    gap: 5px;
    margin-top: 15px;
  }
  .ctrl-btn {
    width: 60px;
    height: 60px;
    background: #e94560;
    border: none;
    border-radius: 8px;
    font-size: 22px;
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-tap-highlight-color: transparent;
  }
  .ctrl-btn.empty { background: transparent; pointer-events: none; }
  #submitStatus {
    margin-top: 8px;
    font-size: 13px;
    color: #4ecca3;
    min-height: 18px;
    text-align: center;
  }
</style>
</head>
<body>

<div id="score">Score: 0</div>
<canvas id="canvas"></canvas>
<div id="message"></div>
<div id="submitStatus"></div>
<button id="restartBtn" onclick="startGame()">Play Again</button>

<div id="controls">
  <div class="ctrl-btn empty"></div>
  <button class="ctrl-btn" ontouchstart="setDir(0,-1)" onclick="setDir(0,-1)">▲</button>
  <div class="ctrl-btn empty"></div>
  <button class="ctrl-btn" ontouchstart="setDir(-1,0)" onclick="setDir(-1,0)">◀</button>
  <button class="ctrl-btn" ontouchstart="setDir(0,1)" onclick="setDir(0,1)">▼</button>
  <button class="ctrl-btn" ontouchstart="setDir(1,0)" onclick="setDir(1,0)">▶</button>
</div>

<script>
// ── Config — REPLACE with your Cloudflare Worker URL ──────────────────────────
const WORKER_URL = 'https://game-score-saver.YOUR_USERNAME.workers.dev';

// ── Read URL params passed by the bot ─────────────────────────────────────────
const params   = new URLSearchParams(window.location.search);
const CHAT_ID  = params.get('chat_id')  || '';
const MSG_ID   = params.get('msg_id')   || '';
const USER_ID  = params.get('user_id')  || '';
const GAME     = params.get('game')     || 'snake';

// ── Canvas setup ──────────────────────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const ctx    = canvas.getContext('2d');
const size   = Math.min(window.innerWidth - 20, 320);
canvas.width  = size;
canvas.height = size;

const CELL = Math.floor(size / 15);
const COLS = Math.floor(canvas.width  / CELL);
const ROWS = Math.floor(canvas.height / CELL);

let snake, dir, nextDir, food, score, gameLoop, running;

function startGame() {
  snake   = [{x: Math.floor(COLS/2), y: Math.floor(ROWS/2)}];
  dir     = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score   = 0;
  running = true;
  document.getElementById('restartBtn').style.display  = 'none';
  document.getElementById('message').textContent       = '';
  document.getElementById('submitStatus').textContent  = '';
  updateScore();
  placeFood();
  clearInterval(gameLoop);
  gameLoop = setInterval(update, 150);
}

function setDir(x, y) {
  if (x === -dir.x && y === -dir.y) return;
  nextDir = {x, y};
}

function placeFood() {
  let pos;
  do {
    pos = {
      x: Math.floor(Math.random() * COLS),
      y: Math.floor(Math.random() * ROWS)
    };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
}

function update() {
  dir = nextDir;
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};
  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return endGame();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return endGame();
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    updateScore();
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.fillStyle = '#16213e';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Food
  ctx.fillStyle = '#e94560';
  ctx.beginPath();
  ctx.arc(food.x * CELL + CELL/2, food.y * CELL + CELL/2, CELL/2 - 2, 0, Math.PI * 2);
  ctx.fill();

  // Snake
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#4ecca3' : '#45b393';
    ctx.beginPath();
    if (ctx.roundRect) {
      ctx.roundRect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2, 3);
    } else {
      ctx.rect(s.x * CELL + 1, s.y * CELL + 1, CELL - 2, CELL - 2);
    }
    ctx.fill();
  });
}

function updateScore() {
  document.getElementById('score').textContent = `Score: ${score}`;
}

async function endGame() {
  clearInterval(gameLoop);
  running = false;
  document.getElementById('message').textContent      = `Game Over! Final Score: ${score}`;
  document.getElementById('restartBtn').style.display = 'inline-block';

  if (score > 0) {
    await submitScore(score);
  }
}

async function submitScore(finalScore) {
  const statusEl = document.getElementById('submitStatus');
  statusEl.textContent = '⏳ Saving score...';

  if (!CHAT_ID || !MSG_ID || !USER_ID) {
    statusEl.textContent = '⚠️ Could not save score (missing session info).';
    return;
  }

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        user_id:    USER_ID,
        score:      finalScore,
        chat_id:    CHAT_ID,
        message_id: MSG_ID,
        game:       GAME
      })
    });

    const result = await response.json();
    console.log('Score submit result:', result);

    if (result.ok) {
      statusEl.textContent = '✅ Score saved!';
    } else {
      statusEl.textContent = '⚠️ Score could not be saved.';
      console.error('Worker error:', result);
    }
  } catch (e) {
    statusEl.textContent = '⚠️ Network error saving score.';
    console.error('Fetch error:', e);
  }
}

// ── Swipe controls ────────────────────────────────────────────────────────────
let touchStartX = 0, touchStartY = 0;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
  e.preventDefault();
}, {passive: false});

canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) > Math.abs(dy)) {
    setDir(dx > 0 ? 1 : -1, 0);
  } else {
    setDir(0, dy > 0 ? 1 : -1);
  }
  e.preventDefault();
}, {passive: false});

// ── Keyboard controls ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const map = {
    ArrowUp: [0,-1], ArrowDown: [0,1],
    ArrowLeft: [-1,0], ArrowRight: [1,0],
    w: [0,-1], s: [0,1], a: [-1,0], d: [1,0]
  };
  if (map[e.key]) { e.preventDefault(); setDir(...map[e.key]); }
});

startGame();
</script>
</body>
</html>
