name: Games Bot

on:
  schedule:
    - cron: '0 */6 * * *'   # Runs every 6 hours so commands work more often
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install python-telegram-bot PyGithub

      - name: Run bot
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          OWNER_ID:   ${{ secrets.OWNER_ID }}
          GIST_ID:    ${{ secrets.GIST_ID }}
          GH_TOKEN:   ${{ secrets.GH_TOKEN }}
          GAMES_URL:  ${{ secrets.GAMES_URL }}
        run: python bot.py
